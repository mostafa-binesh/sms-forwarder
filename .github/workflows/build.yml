name: Build & Sign APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Auto-increment version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.$VERSION_CODE\"/" app/build.gradle
          echo "VERSION_TAG=1.0.$VERSION_CODE" >> $GITHUB_ENV
          echo "📦 Version: 1.0.$VERSION_CODE"

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release-key.jks
          echo "✅ Keystore decoded"

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: /tmp/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          ${BUILD_TOOLS}apksigner verify --verbose app/build/outputs/apk/release/app-release.apk || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-signed-${{ env.VERSION_TAG }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-debug-${{ env.VERSION_TAG }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
