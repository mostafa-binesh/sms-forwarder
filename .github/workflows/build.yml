name: Build & Sign APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Auto-increment version
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.$VERSION_CODE\"/" app/build.gradle
          echo "VERSION_TAG=1.0.$VERSION_CODE" >> $GITHUB_ENV
          echo "📦 Version: 1.0.$VERSION_CODE"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release-key.jks \
            -alias smsforwarder \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass smsforwarder123 \
            -keypass smsforwarder123 \
            -dname "CN=Mostafa Binesh, OU=Dev, O=Personal, L=Tehran, ST=Tehran, C=IR"

      - name: Build Release APK (unsigned by gradle)
        run: ./gradlew assembleRelease

      - name: Sign APK with v1+v2+v3
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"
          
          # Remove existing signature if any
          rm -rf app/build/outputs/apk/release/app-release.apk.sig
          
          # Sign with all schemes
          ${BUILD_TOOLS}apksigner sign \
            --ks app/release-key.jks \
            --ks-pass pass:smsforwarder123 \
            --ks-key-alias smsforwarder \
            --key-pass pass:smsforwarder123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v1-signing-enabled true \
            app/build/outputs/apk/release/app-release.apk
          
          # Verify
          echo "=== Verification ==="
          ${BUILD_TOOLS}apksigner verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-signed-${{ env.VERSION_TAG }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarder-debug-${{ env.VERSION_TAG }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
